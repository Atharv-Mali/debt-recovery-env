name: debt-recovery-collections
version: "1.0.0"
description: >
  Real-world Indian NBFC loan collections environment. An AI agent manages
  1-25 overdue loan accounts per episode, learning empathy-vs-pressure
  tradeoffs under RBI regulatory constraints. Domain: Indian NBFC
  financial services. Novel domain with zero prior OpenEnv entries.
domain: financial-services
author: Atharv Mali
tasks:
  - id: task1_single_cooperative
    difficulty: easy
    max_steps: 10
    reward_range: [0.0, 1.0]
    description: "Single cooperative borrower. Establish contact and secure PTP."
  - id: task2_portfolio_mixed
    difficulty: medium
    max_steps: 30
    reward_range: [0.0, 1.0]
    description: "10 mixed accounts. Balance recovery, compliance, sentiment."
  - id: task3_portfolio_adversarial
    difficulty: hard
    max_steps: 60
    reward_range: [0.0, 1.0]
    description: "25 adversarial accounts with mid-episode regulatory shock."
observation_space: PortfolioObservation
action_space: CollectionAction
reward_model: CollectionReward
tags: [openenv, finance, nbfc, collections, india, rl, real-world, regulatory]
base_url: "https://atharvmali10-debt-recovery-env.hf.space"
